---
- name: Restart Netdata
  ansible.builtin.systemd:
    name: netdata
    state: restarted
    daemon_reload: true
    enabled: true
  when: ansible_service_mgr == "systemd"

- name: Reload Netdata claiming state
  ansible.builtin.command: netdatacli reload-claiming-state
  changed_when: true
  failed_when: false

- name: "Update dnf cache"
  become: true
  ansible.builtin.dnf:
    update_cache: true
...
