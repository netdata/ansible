galaxy_info:
  author: Ralph Meijer
  description: Deploys the Netdata Agent
  company: Netdata, Inc.
  role_name: netdata

  license: Apache-2.0

  min_ansible_version: "2.1"

  # If this a Container Enabled role, provide the minimum Ansible Container version.
  # min_ansible_container_version:

  platforms:
    - name: Debian
      versions:
        - bullseye
        - bookworm
    - name: Ubuntu
      versions:
        - jammy
        - noble
    - name: opensuse
      versions:
        - all
    - name: EL
      versions:
        - 9
        - 10

  galaxy_tags:
    - monitoring
    - netdata
    - metrics
    - observability
    - system

# No role dependencies.
dependencies: []
