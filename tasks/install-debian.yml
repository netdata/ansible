---

- name: Add repo and install package
  block:

    - name: Ensure gpg is installed.
      ansible.builtin.apt:
        name: gnupg
        state: present
        update_cache: true

    - name: Ensure keyrings directory exists
      ansible.builtin.file:
        path: /etc/apt/keyrings
        state: directory
        mode: "0755"

    - name: Download Netdata GPG key
      ansible.builtin.get_url:
        url: "{{ netdata_repository_key_url }}"
        dest: /etc/apt/keyrings/netdata.asc
        mode: "0644"

    - name: Dearmor Netdata GPG key
      ansible.builtin.command:
        cmd: gpg --batch --yes --dearmor -o /etc/apt/keyrings/netdata.gpg /etc/apt/keyrings/netdata.asc
        creates: /etc/apt/keyrings/netdata.gpg

    - name: Add repository
      ansible.builtin.apt_repository:
        filename: "netdata"
        repo: >-
          deb [signed-by=/etc/apt/keyrings/netdata.gpg]
          {{ netdata_repository_url }}{{ netdata_release_channel_normalized }}/{{
          ansible_facts.distribution | lower }}/
          {{ ansible_distribution_release | lower }}/
        state: present

    - name: Install package
      ansible.builtin.apt:
        name: "netdata"
        state: present
        install_recommends: true
        update_cache: true
      notify: Restart Netdata

    - name: Install chart support if enabled
      ansible.builtin.apt:
        name: "netdata-plugin-chartsd"
        state: present
      notify: Restart Netdata
      when: netdata_manage_charts
