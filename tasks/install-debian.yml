---

- name: Add repo and install package
  block:

    - name: Ensure gpg is installed.
      ansible.builtin.apt:
        name: gnupg
        state: present
        update_cache: true

    - name: Install Netdata repo key.
      ansible.builtin.apt_key:
        url: "{{ netdata_repository_key_url }}"
        id: "6588FDD7B14721FE7C3115E6F9177B5265F56346"
        state: present

    - name: Add repository
      ansible.builtin.apt_repository:
        filename: "netdata"
        repo: >-
          deb {{ netdata_repository_url }}{{ netdata_release_channel_normalized }}/{{
          ansible_facts.distribution | lower }}/
          {{ ansible_distribution_release | lower }}/
        state: present

    - name: Install package
      ansible.builtin.apt:
        name: "netdata"
        state: present
        install_recommends: true
        update_cache: true
      notify: Restart Netdata

    - name: Install chart support if enabled
      ansible.builtin.apt:
        name: "netdata-plugin-chartsd"
        state: present
      notify: Restart Netdata
      when: netdata_manage_charts
